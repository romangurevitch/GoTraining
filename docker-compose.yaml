services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gobank
      POSTGRES_USER: gotrainer
      POSTGRES_PASSWORD: verysecret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotrainer -d gobank"]
      interval: 5s
      timeout: 5s
      retries: 5
